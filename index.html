<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>8 VISUAL BOARD</title>
  <meta name="description" content="8人の写真を公式順に並べて、1枚の保存画像を作れる非公式ファンツールです。" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Yomogi&display=swap" rel="stylesheet">
  <style>
    :root { --ink:#25222a; --muted:#7d7481; --line:#eadde7; --pink-strong:#ff8ab7; --shadow:0 16px 40px rgba(89,50,80,.12); --radius:24px; }
    *{box-sizing:border-box}
    body{margin:0;font-family:"M PLUS Rounded 1c",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);background:radial-gradient(circle at top left,#e4f8ff 0,transparent 32%),radial-gradient(circle at top right,#ffe1ef 0,transparent 34%),linear-gradient(180deg,#fff8fb 0%,#f8fbff 100%);min-height:100vh}
    a{color:inherit;text-decoration:none} button,input,label{font:inherit} button{cursor:pointer}
    .common-header{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);background:rgba(255,248,251,.84);border-bottom:1px solid rgba(234,221,231,.9)}
    .common-header-inner{max-width:1100px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:8px;font-weight:800;letter-spacing:.04em;white-space:nowrap}
    .brand-mark{width:32px;height:32px;display:grid;place-items:center;border-radius:999px;background:linear-gradient(135deg,#ffd6e7,#dff5ff);box-shadow:0 8px 18px rgba(255,138,183,.2);font-family:"Yomogi",cursive}
    .nav-links{display:flex;align-items:center;gap:8px;overflow-x:auto;padding-bottom:2px}
    .nav-links a{flex:0 0 auto;font-size:12px;font-weight:700;padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.72)}
    .nav-links a.current{background:var(--ink);color:#fff;border-color:var(--ink)}
    .page{max-width:1100px;margin:0 auto;padding:12px 16px 88px}
    .top-note{display:flex;justify-content:center;margin:2px 0 12px}
    .eyebrow{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.74);border:1px solid var(--line);font-size:12px;font-weight:700;color:var(--muted)}
    .main-grid{display:grid;grid-template-columns:minmax(0,1fr) 390px;gap:16px;align-items:start}
    .card{background:rgba(255,255,255,.9);border:1px solid rgba(234,221,231,.9);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
    .editor-wrap{padding:14px;display:grid;gap:14px}
    .toolbar{display:grid;gap:12px}
    .toolbar-group{display:grid;gap:8px}
    .toolbar-label{font-size:12px;font-weight:900;color:var(--muted);letter-spacing:.02em;padding-left:2px}
    .chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:9px 14px;font-size:13px;font-weight:800;min-width:72px;box-shadow:0 4px 12px rgba(89,50,80,.06)}
    .chip.is-active{background:var(--ink);color:#fff;border-color:var(--ink)}
    .toolbar-row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .mini-btn{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:9px 14px;font-size:12px;font-weight:800}
    .upload-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .upload-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:9px;box-shadow:0 8px 18px rgba(89,50,80,.05)}
    .member-label{text-align:center;font-size:11px;font-weight:900;letter-spacing:.05em;margin-bottom:6px}
    .portrait-box{position:relative;width:100%;aspect-ratio:3/4;border:1.5px dashed #d7c6d3;border-radius:14px;overflow:hidden;background:linear-gradient(135deg,rgba(255,214,231,.30),rgba(223,245,255,.35));display:block}
    .portrait-box img{position:absolute;display:block;object-fit:cover;transform-origin:center center;user-select:none;pointer-events:none}
    .add-label{position:absolute;inset:0;display:grid;place-items:center;text-align:center;color:#665a66;font-size:11px;font-weight:800;line-height:1.5;cursor:pointer;background:transparent}
    .add-label strong{display:block;font-size:26px;line-height:1;font-weight:500}
    .file-input{display:none}
    .mini-controls{margin-top:8px;display:grid;gap:7px}
    .range-row{display:grid;grid-template-columns:38px 1fr;align-items:center;gap:6px;font-size:10px;color:var(--muted);font-weight:800}
    .range-row input[type="range"]{width:100%;accent-color:var(--pink-strong)}
    .preview-card{position:sticky;top:82px;overflow:visible}
    .preview-wrap{padding:12px;display:grid;gap:12px}
    .canvas-shell{position:relative;border-radius:22px;background:rgba(255,255,255,.92);border:1px solid rgba(234,221,231,.9);padding:10px;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.7),0 14px 34px rgba(89,50,80,.10)}
    canvas{width:100%;height:auto;display:block;border-radius:14px;background:transparent;box-shadow:0 8px 24px rgba(89,50,80,.07)}
    .preview-actions{display:grid;gap:8px}
    .btn{border:0;border-radius:18px;padding:14px 16px;font-weight:900;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:8px}
    .btn.share{width:100%;background:linear-gradient(135deg,#ff8ab7,#8adcf6);color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.14);box-shadow:0 14px 26px rgba(255,138,183,.26)}
    .btn:disabled{opacity:.58;cursor:wait}
    .download-link{text-align:center;font-size:12px;font-weight:800;color:var(--muted);border:0;background:transparent;text-decoration:underline;text-underline-offset:4px;padding:8px}
    .bottom-bar{display:none}
    .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;background:rgba(37,34,42,.92);color:#fff;padding:12px 16px;border-radius:999px;font-size:13px;font-weight:800;z-index:100;transition:.22s ease;max-width:calc(100% - 32px);text-align:center}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media (max-width:920px){.main-grid{grid-template-columns:1fr}.preview-card{position:static;order:-1}}
    @media (max-width:640px){
      .common-header-inner{align-items:flex-start;flex-direction:column}.nav-links{width:100%}.page{padding:10px 12px 92px}
      .editor-wrap,.preview-wrap{padding:12px;gap:12px}.upload-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
      .upload-card{padding:8px;border-radius:16px}.toolbar-group{gap:6px}.chips{display:grid;grid-template-columns:repeat(3,minmax(0,1fr))}
      .chips.effect-chips{grid-template-columns:repeat(3,minmax(0,1fr))}.chip{min-width:0;width:100%;padding:10px 8px;font-size:12px}
      .preview-actions{display:none}.bottom-bar{display:grid;grid-template-columns:1fr 1.25fr;gap:8px;position:fixed;left:12px;right:12px;bottom:12px;z-index:60}
      .bottom-bar .mini-btn,.bottom-bar .btn{border-radius:16px;padding:14px 12px}.bottom-bar .mini-btn{background:rgba(255,255,255,.96);color:var(--muted);border:1px solid var(--line);box-shadow:0 10px 20px rgba(89,50,80,.08)}
    }
  </style>
</head>
<body>
  <header class="common-header">
    <div class="common-header-inner">
      <a class="brand" href="https://rikomuze.github.io/tool-box/"><span class="brand-mark">♡</span><span>MUZE TOOL BOX</span></a>
      <nav class="nav-links" aria-label="共通ナビゲーション">
        <a href="https://rikomuze.github.io/tool-box/">TOOL BOX</a>
        <a href="https://rikomuze.github.io/oshi-visual-6/">推しビジュ6選</a>
        <a class="current" href="./">8 VISUAL BOARD</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="top-note"><div class="eyebrow">8 VISUAL BOARD</div></div>

    <div class="main-grid">
      <section class="card">
        <div class="editor-wrap">
          <div class="toolbar">
            <div class="toolbar-group">
              <div class="toolbar-label">デザイン</div>
              <div class="chips" id="themeChips">
                <button type="button" class="chip" data-theme="none">背景なし</button>
                <button type="button" class="chip is-active" data-theme="soda">ソーダ</button>
                <button type="button" class="chip" data-theme="berry">ベリー</button>
                <button type="button" class="chip" data-theme="classical">クラシカル</button>
              </div>
            </div>

            <div class="toolbar-group">
              <div class="toolbar-label">エフェクト</div>
              <div class="chips effect-chips" id="effectChips">
                <button type="button" class="chip" data-effect="none">なし</button>
                <button type="button" class="chip is-active" data-effect="soft">ふんわり</button>
                <button type="button" class="chip" data-effect="clear">透明感</button>
                <button type="button" class="chip" data-effect="sparkle">きらきら</button>
                <button type="button" class="chip" data-effect="film">フィルム</button>
                <button type="button" class="chip" data-effect="mode">モード</button>
              </div>
            </div>

            <div class="toolbar-row">
              <div class="toolbar-label">写真の間は強めにぼかします</div>
              <button type="button" class="mini-btn" id="resetBtn">↺ リセット</button>
            </div>
          </div>

          <div class="upload-grid" id="uploadGrid"></div>
        </div>
      </section>

      <aside class="card preview-card" id="previewArea">
        <div class="preview-wrap">
          <div class="canvas-shell"><canvas id="boardCanvas"></canvas></div>
          <div class="preview-actions">
            <button type="button" class="btn share" id="shareBtn">画像をシェア / 保存</button>
            <button type="button" class="download-link" id="downloadBtn">保存できないときはこちら</button>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <div class="bottom-bar">
    <button type="button" class="mini-btn" id="mobileResetBtn">↺ リセット</button>
    <button type="button" class="btn share" id="mobileShareBtn">画像をシェア / 保存</button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const MEMBERS=[{label:"KAIRYU"},{label:"NAOYA"},{label:"RAN"},{label:"SEITO"},{label:"RYUKI"},{label:"TAKUTO"},{label:"HAYATO"},{label:"EIKI"}];
    const state={theme:"soda",effect:"soft",items:MEMBERS.map(()=>({img:null,url:"",scale:1,x:0,y:0}))};
    const uploadGrid=document.getElementById("uploadGrid");
    const canvas=document.getElementById("boardCanvas");
    const ctx=canvas.getContext("2d");
    const toast=document.getElementById("toast");

    function showToast(message){toast.textContent=message;toast.classList.add("show");clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>toast.classList.remove("show"),2400);}
    function getThemeConfig(){
      if(state.theme==="berry"){return{pad:26,boardFill:"#fff2f8",bgStart:"#ffd4e8",bgEnd:"#ffeef6"}}
      if(state.theme==="classical"){return{pad:26,boardFill:"#fdf8ef",bgStart:"#eadfcc",bgEnd:"#f7f1e6"}}
      return{pad:26,boardFill:"#f7fcff",bgStart:"#d9f3ff",bgEnd:"#eefaff"}
    }
    function setThumbImageStyle(imgEl,item){
      const boxRatio=3/4;
      const imgRatio=item.img.naturalWidth/item.img.naturalHeight;
      let widthPct,heightPct;
      if(imgRatio>boxRatio){widthPct=(imgRatio/boxRatio)*100*item.scale;heightPct=100*item.scale;}
      else{widthPct=100*item.scale;heightPct=(boxRatio/imgRatio)*100*item.scale;}
      const leftPct=(100-widthPct)/2+item.x/2;
      const topPct=(100-heightPct)/2+item.y/2;
      imgEl.style.width=`${widthPct}%`; imgEl.style.height=`${heightPct}%`;
      imgEl.style.left=`${leftPct}%`; imgEl.style.top=`${topPct}%`;
    }

    function renderUploadGrid(){
      uploadGrid.innerHTML="";
      MEMBERS.forEach((member,index)=>{
        const item=state.items[index], hasImage=!!item.url;
        const card=document.createElement("div");
        card.className="upload-card";
        card.innerHTML=`
          <div class="member-label">${member.label}</div>
          <div class="portrait-box">
            ${hasImage?`<img src="${item.url}" alt="${member.label}" data-upload-img="${index}">`:""}
            <label class="add-label" for="file-${index}"><span><strong>＋</strong>画像を追加</span></label>
            <input class="file-input" id="file-${index}" type="file" accept=".jpg,.jpeg,.png,.webp" data-file-index="${index}">
          </div>
          ${hasImage?`<div class="mini-controls">
            <label class="range-row"><span>拡大</span><input type="range" min="1" max="2.2" step="0.01" value="${item.scale}" data-control="scale" data-index="${index}"></label>
            <label class="range-row"><span>左右</span><input type="range" min="-80" max="80" step="1" value="${item.x}" data-control="x" data-index="${index}"></label>
            <label class="range-row"><span>上下</span><input type="range" min="-80" max="80" step="1" value="${item.y}" data-control="y" data-index="${index}"></label>
          </div>`:""}
        `;
        uploadGrid.appendChild(card);
      });
      document.querySelectorAll("[data-file-index]").forEach(input=>input.addEventListener("change",handleFileSelect));
      document.querySelectorAll("[data-control]").forEach(range=>range.addEventListener("input",handleRangeChange));
      MEMBERS.forEach((_,index)=>{const item=state.items[index]; const imgEl=document.querySelector(`[data-upload-img="${index}"]`); if(imgEl&&item.img){setThumbImageStyle(imgEl,item);}});
    }

    function handleFileSelect(event){
      const index=Number(event.target.dataset.fileIndex);
      const file=event.target.files[0];
      if(!file) return;
      const url=URL.createObjectURL(file);
      const img=new Image();
      img.onload=()=>{
        if(state.items[index].url) URL.revokeObjectURL(state.items[index].url);
        state.items[index]={img,url,scale:1,x:0,y:0};
        renderUploadGrid(); drawBoard();
      };
      img.src=url;
    }

    function handleRangeChange(event){
      const index=Number(event.target.dataset.index);
      const key=event.target.dataset.control;
      state.items[index][key]=Number(event.target.value);
      const item=state.items[index];
      const imgEl=document.querySelector(`[data-upload-img="${index}"]`);
      if(imgEl&&item.img) setThumbImageStyle(imgEl,item);
      drawBoard();
    }

    function getImageFilter(){
      switch(state.effect){
        case "soft": return "brightness(1.04) saturate(1.08) contrast(0.97)";
        case "clear": return "brightness(1.08) saturate(0.98) contrast(0.94)";
        case "sparkle": return "brightness(1.07) saturate(1.12) contrast(1.02)";
        case "film": return "sepia(0.16) saturate(0.86) contrast(0.96) brightness(1.02)";
        case "mode": return "brightness(0.92) saturate(0.94) contrast(1.15)";
        default: return "none";
      }
    }

    function drawCoverImage(img,dx,dy,dw,dh,item){
      const baseScale=Math.max(dw/img.naturalWidth,dh/img.naturalHeight);
      const finalScale=baseScale*item.scale;
      const sw=img.naturalWidth*finalScale;
      const sh=img.naturalHeight*finalScale;
      const offsetX=(item.x/100)*(dw/2);
      const offsetY=(item.y/100)*(dh/2);
      const sx=dx+(dw-sw)/2+offsetX;
      const sy=dy+(dh-sh)/2+offsetY;

      if(state.effect==="soft"||state.effect==="sparkle"||state.effect==="clear"){
        ctx.save(); ctx.filter="blur(10px) brightness(1.08) saturate(1.08)"; ctx.globalAlpha=state.effect==="sparkle"?0.12:0.16; ctx.drawImage(img,sx,sy,sw,sh); ctx.restore();
      }
      ctx.save(); ctx.filter=getImageFilter(); ctx.drawImage(img,sx,sy,sw,sh); ctx.restore();
    }

    function drawPlaceholder(x,y,w,h){
      const theme=getThemeConfig();
      const grad=ctx.createLinearGradient(x,y,x+w,y+h);
      grad.addColorStop(0,theme.bgStart); grad.addColorStop(1,theme.bgEnd);
      ctx.fillStyle=grad; ctx.fillRect(x,y,w,h);
    }

    function drawThemeBackground(cw,ch,boardX,boardY,boardW,boardH){
      const theme=getThemeConfig();
      const bg=ctx.createLinearGradient(0,0,cw,ch);
      bg.addColorStop(0,theme.bgStart); bg.addColorStop(1,theme.bgEnd);
      ctx.fillStyle=bg; ctx.fillRect(0,0,cw,ch);
      ctx.fillStyle=theme.boardFill; ctx.fillRect(boardX,boardY,boardW,boardH);
    }

    function blurSeams(boardX,boardY,boardW,boardH,cols,rows,tileW,tileH){
      const band=Math.max(18,Math.round(tileW*0.055));
      ctx.save(); ctx.beginPath(); ctx.rect(boardX,boardY,boardW,boardH); ctx.clip(); ctx.filter="blur(12px)"; ctx.globalAlpha=0.62;
      for(let c=1;c<cols;c++){const x=boardX+c*tileW; ctx.drawImage(canvas,x-band,boardY,band*2,boardH,x-band,boardY,band*2,boardH);}
      for(let r=1;r<rows;r++){const y=boardY+r*tileH; ctx.drawImage(canvas,boardX,y-band,boardW,band*2,boardX,y-band,boardW,band*2);}
      ctx.restore();

      ctx.save(); ctx.beginPath(); ctx.rect(boardX,boardY,boardW,boardH); ctx.clip(); ctx.globalAlpha=0.08;
      for(let c=1;c<cols;c++){const x=boardX+c*tileW; const grad=ctx.createLinearGradient(x-band,0,x+band,0); grad.addColorStop(0,"rgba(255,255,255,0)"); grad.addColorStop(0.5,"rgba(255,255,255,0.38)"); grad.addColorStop(1,"rgba(255,255,255,0)"); ctx.fillStyle=grad; ctx.fillRect(x-band,boardY,band*2,boardH);}
      for(let r=1;r<rows;r++){const y=boardY+r*tileH; const grad=ctx.createLinearGradient(0,y-band,0,y+band); grad.addColorStop(0,"rgba(255,255,255,0)"); grad.addColorStop(0.5,"rgba(255,255,255,0.34)"); grad.addColorStop(1,"rgba(255,255,255,0)"); ctx.fillStyle=grad; ctx.fillRect(boardX,y-band,boardW,band*2);}
      ctx.restore();
    }

    function drawStar(x,y,r,alpha){
      ctx.save(); ctx.globalAlpha=alpha; ctx.translate(x,y); ctx.rotate(Math.PI/4); ctx.fillStyle="#ffffff";
      ctx.beginPath(); ctx.moveTo(0,-r); ctx.lineTo(r*.22,-r*.22); ctx.lineTo(r,0); ctx.lineTo(r*.22,r*.22); ctx.lineTo(0,r); ctx.lineTo(-r*.22,r*.22); ctx.lineTo(-r,0); ctx.lineTo(-r*.22,-r*.22); ctx.closePath(); ctx.fill(); ctx.restore();
    }

    function applyEffectOverlay(boardX,boardY,boardW,boardH){
      if(state.effect==="none") return;
      ctx.save(); ctx.beginPath(); ctx.rect(boardX,boardY,boardW,boardH); ctx.clip();

      if(state.effect==="soft"){
        const softLight=ctx.createRadialGradient(boardX+boardW*.5,boardY+boardH*.38,boardW*.05,boardX+boardW*.5,boardY+boardH*.38,boardW*.78);
        softLight.addColorStop(0,"rgba(255,255,255,0.13)"); softLight.addColorStop(0.48,"rgba(255,238,247,0.08)"); softLight.addColorStop(1,"rgba(255,255,255,0)");
        ctx.fillStyle=softLight; ctx.fillRect(boardX,boardY,boardW,boardH);
        const tint=ctx.createLinearGradient(boardX,boardY,boardX+boardW,boardY+boardH);
        tint.addColorStop(0,"rgba(255,218,235,0.09)"); tint.addColorStop(0.5,"rgba(255,255,255,0.02)"); tint.addColorStop(1,"rgba(215,245,255,0.07)");
        ctx.fillStyle=tint; ctx.fillRect(boardX,boardY,boardW,boardH);
      }

      if(state.effect==="clear"){
        const veil=ctx.createLinearGradient(boardX,boardY,boardX+boardW,boardY+boardH);
        veil.addColorStop(0,"rgba(235,250,255,0.16)"); veil.addColorStop(0.45,"rgba(255,255,255,0.08)"); veil.addColorStop(1,"rgba(216,238,255,0.12)");
        ctx.fillStyle=veil; ctx.fillRect(boardX,boardY,boardW,boardH);
        const light=ctx.createRadialGradient(boardX+boardW*.52,boardY+boardH*.34,boardW*.05,boardX+boardW*.52,boardY+boardH*.34,boardW*.72);
        light.addColorStop(0,"rgba(255,255,255,0.16)"); light.addColorStop(1,"rgba(255,255,255,0)");
        ctx.fillStyle=light; ctx.fillRect(boardX,boardY,boardW,boardH);
      }

      if(state.effect==="sparkle"){
        const tint=ctx.createLinearGradient(boardX,boardY,boardX+boardW,boardY+boardH);
        tint.addColorStop(0,"rgba(255,230,244,0.11)"); tint.addColorStop(0.55,"rgba(255,255,255,0.04)"); tint.addColorStop(1,"rgba(226,246,255,0.09)");
        ctx.fillStyle=tint; ctx.fillRect(boardX,boardY,boardW,boardH);
        ctx.globalCompositeOperation="screen";
        for(let i=0;i<26;i++){
          const px=Math.abs(Math.sin(i*12.9898)*43758.5453%1), py=Math.abs(Math.sin(i*78.233)*12345.6789%1);
          const x=boardX+px*boardW, y=boardY+py*boardH, r=2.5+(i%4), alpha=0.12+(i%5)*0.025;
          if(i%4===0) drawStar(x,y,r*2.2,alpha+0.06);
          else{ctx.globalAlpha=alpha; ctx.fillStyle="#ffffff"; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();}
        }
      }

      if(state.effect==="film"){
        ctx.globalAlpha=0.12; ctx.fillStyle="#8b6f58"; ctx.fillRect(boardX,boardY,boardW,boardH);
        ctx.globalAlpha=0.10;
        for(let i=0;i<900;i++){const x=boardX+Math.abs(Math.sin(i*91.17)*10000%1)*boardW, y=boardY+Math.abs(Math.sin(i*17.31)*10000%1)*boardH, shade=i%2===0?255:40; ctx.fillStyle=`rgba(${shade},${shade},${shade},0.25)`; ctx.fillRect(x,y,1.2,1.2);}
      }

      if(state.effect==="mode"){
        const vignette=ctx.createRadialGradient(boardX+boardW*.5,boardY+boardH*.42,boardW*.15,boardX+boardW*.5,boardY+boardH*.42,boardW*.82);
        vignette.addColorStop(0,"rgba(0,0,0,0)"); vignette.addColorStop(0.72,"rgba(0,0,0,0.06)"); vignette.addColorStop(1,"rgba(0,0,0,0.23)");
        ctx.fillStyle=vignette; ctx.fillRect(boardX,boardY,boardW,boardH);
        ctx.globalAlpha=0.09; ctx.fillStyle="#0f0d14"; ctx.fillRect(boardX,boardY,boardW,boardH);
      }
      ctx.restore();
    }

    function drawBoard(){
      const cols=4, rows=2, innerWidth=1600;
      const tileW=Math.floor(innerWidth/cols), tileH=Math.round(tileW*4/3), innerHeight=tileH*rows;
      const theme=getThemeConfig();
      const boardX=theme.pad, boardY=theme.pad, boardW=innerWidth, boardH=innerHeight, cw=innerWidth+theme.pad*2, ch=innerHeight+theme.pad*2;

      canvas.width=cw; canvas.height=ch;
      ctx.clearRect(0,0,cw,ch);
      drawThemeBackground(cw,ch,boardX,boardY,boardW,boardH);

      for(let i=0;i<MEMBERS.length;i++){
        const col=i%cols, row=Math.floor(i/cols), x=boardX+col*tileW, y=boardY+row*tileH, item=state.items[i];
        ctx.save(); ctx.beginPath(); ctx.rect(x,y,tileW,tileH); ctx.clip();
        if(item.img) drawCoverImage(item.img,x,y,tileW,tileH,item);
        else drawPlaceholder(x,y,tileW,tileH);
        ctx.restore();
      }
      blurSeams(boardX,boardY,boardW,boardH,cols,rows,tileW,tileH);
      applyEffectOverlay(boardX,boardY,boardW,boardH);
    }

    function setActiveChip(groupSelector,datasetKey,value){
      const attrName=datasetKey.replace(/[A-Z]/g,letter=>"-"+letter.toLowerCase());
      document.querySelectorAll(`${groupSelector} [data-${attrName}]`).forEach(btn=>btn.classList.toggle("is-active",btn.dataset[datasetKey]===value));
    }

    function resetAll(){
      state.items.forEach(item=>{if(item.url) URL.revokeObjectURL(item.url);});
      state.theme="soda"; state.effect="soft"; state.items=MEMBERS.map(()=>({img:null,url:"",scale:1,x:0,y:0}));
      setActiveChip("#themeChips","theme","soda"); setActiveChip("#effectChips","effect","soft");
      renderUploadGrid(); drawBoard(); showToast("リセットしました");
    }

    function canvasToBlob(){
      drawBoard();
      return new Promise((resolve,reject)=>{canvas.toBlob(blob=>blob?resolve(blob):reject(new Error("画像の作成に失敗しました")),"image/png",1);});
    }

    function downloadBlob(blob){
      const url=URL.createObjectURL(blob), a=document.createElement("a");
      a.href=url; a.download="8-visual-board.png"; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),1200);
    }

    async function shareOrSave(){
      const shareButtons=[document.getElementById("shareBtn"),document.getElementById("mobileShareBtn")];
      shareButtons.forEach(btn=>{if(btn){btn.disabled=true; btn.textContent="画像を作成中…";}});
      try{
        const blob=await canvasToBlob();
        const file=new File([blob],"8-visual-board.png",{type:"image/png"});
        if(navigator.canShare&&navigator.canShare({files:[file]})){
          await navigator.share({files:[file],title:"8 VISUAL BOARD",text:"8 VISUAL BOARDで作成しました"});
          showToast("共有メニューを開きました");
        }else{
          downloadBlob(blob); showToast("画像を保存しました");
        }
      }catch(error){
        if(error.name!=="AbortError") showToast("画像の作成に失敗しました");
      }finally{
        shareButtons.forEach(btn=>{if(btn){btn.disabled=false; btn.textContent="画像をシェア / 保存";}});
      }
    }

    async function downloadOnly(){try{const blob=await canvasToBlob(); downloadBlob(blob); showToast("画像を保存しました");}catch(error){showToast("画像の保存に失敗しました");}}

    document.querySelectorAll("[data-theme]").forEach(btn=>btn.addEventListener("click",()=>{state.theme=btn.dataset.theme; setActiveChip("#themeChips","theme",state.theme); drawBoard();}));
    document.querySelectorAll("[data-effect]").forEach(btn=>btn.addEventListener("click",()=>{state.effect=btn.dataset.effect; setActiveChip("#effectChips","effect",state.effect); drawBoard();}));
    document.getElementById("resetBtn").addEventListener("click",resetAll);
    document.getElementById("mobileResetBtn").addEventListener("click",resetAll);
    document.getElementById("shareBtn").addEventListener("click",shareOrSave);
    document.getElementById("mobileShareBtn").addEventListener("click",shareOrSave);
    document.getElementById("downloadBtn").addEventListener("click",downloadOnly);

    renderUploadGrid(); drawBoard();
  </script>
</body>
</html>
